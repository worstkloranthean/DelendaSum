baseURL = 'https://worst-kloranthean.github.io/delendasum/'
locale = 'en-us'
title = 'Delenda Sum'
theme = ["PaperModest"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
[params]
  math = true
  hideFooter = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'